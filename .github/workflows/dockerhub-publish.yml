name: Publish webapp images (Docker Hub)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag (defaults to 'latest' on main, or short SHA otherwise)"
        required: false
        type: string
  push:
    branches: ["main", "master"]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/railway-opendata-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/railway-opendata-frontend

jobs:
  build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          TAG_INPUT="${{ github.event.inputs.tag }}"
          if [[ -n "$TAG_INPUT" ]]; then
            TAG="$TAG_INPUT"
          elif [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
            TAG="latest"
          else
            TAG="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: webapp/backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tags.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: webapp/frontend
          file: webapp/frontend/Dockerfile.prod
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VITE_API_URL=http://backend:8000
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tags.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
